# =====================
# GENERAL
# =====================
set -g mouse on
set -g base-index 1
set -g xterm-keys on
set -sg escape-time 0
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:Tc"

# =====================
# RELOAD CONFIG
# =====================
bind r source-file ~/.psmux.conf \; display-message "Reloaded!"

# =====================
# SMART VIM-AWARE NAVIGATION
# =====================
vim_pattern='(\S+/)?g?\.?(view|l?n?vim?x?|fzf)(diff)?(-wrapped)?'
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +${vim_pattern}$'"

# Alt + hjkl
bind -n M-h if-shell "$is_vim" 'send-keys M-h' 'select-pane -L'
bind -n M-j if-shell "$is_vim" 'send-keys M-j' 'select-pane -D'
bind -n M-k if-shell "$is_vim" 'send-keys M-k' 'select-pane -U'
bind -n M-l if-shell "$is_vim" 'send-keys M-l' 'select-pane -R'

# last pane
bind -n M-o if-shell "$is_vim" 'send-keys M-o' 'select-pane -l'

# =====================
# SPLITS
# =====================
bind | split-window -h
bind - split-window -v

# =====================
# RESIZE (stable Windows Terminal-safe)
# =====================
bind -n C-M-h resize-pane -L 5
bind -n C-M-j resize-pane -D 5
bind -n C-M-k resize-pane -U 5
bind -n C-M-l resize-pane -R 5

# =====================
# COPY MODE (vi-style)
# =====================
bind-key -T copy-mode-vi M-h select-pane -L
bind-key -T copy-mode-vi M-j select-pane -D
bind-key -T copy-mode-vi M-k select-pane -U
bind-key -T copy-mode-vi M-l select-pane -R
bind-key -T copy-mode-vi M-o select-pane -l

# =====================
# LAYOUT
# =====================
bind = select-layout even-horizontal
